<!DOCTYPE html>
<html lang="en"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Heritage Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1a0d;
  --surface: #142214;
  --card-m: linear-gradient(160deg,#1e3f6e,#2a5898);
  --card-f: linear-gradient(160deg,#6e1e45,#982a62);
  --card-dec: linear-gradient(160deg,#3a3a3a,#555);
  --accent: #c9a84c;
  --accent2: #e8cc7a;
  --green-d: #1a3c1a;
  --green-m: #2d5a27;
  --green-l: #4a7c59;
  --cream: #f0ebe0;
  --line: #c9a84c;
  --text-dim: #9eb09e;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Crimson Text',Georgia,serif;background:var(--bg);color:var(--cream)}

/* ─── HEADER ─── */
header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:linear-gradient(90deg,#0d1a0d 0%,#1a3c1a 50%,#0d1a0d 100%);
  border-bottom:2px solid var(--accent);
  padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 4px 30px rgba(0,0,0,.7);
}
.hdr-brand{display:flex;flex-direction:column}
.hdr-title{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent);letter-spacing:3px}
.hdr-sub{font-size:.8rem;color:var(--text-dim);letter-spacing:2px;margin-top:2px}
.hdr-right{display:flex;gap:12px;align-items:center}

/* ─── BUTTONS ─── */
.btn{
  padding:9px 22px;border:2px solid var(--accent);background:transparent;
  color:var(--accent);font-family:'Crimson Text',serif;font-size:.95rem;
  cursor:pointer;letter-spacing:1px;transition:all .25s;border-radius:3px;
}
.btn:hover{background:var(--accent);color:var(--bg)}
.btn-fill{background:var(--accent);color:var(--bg)}
.btn-fill:hover{background:var(--accent2)}
.btn-red{border-color:#c0392b;color:#c0392b}
.btn-red:hover{background:#c0392b;color:#fff}
.btn-sm{padding:6px 14px;font-size:.85rem}

/* ─── LEGEND ─── */
#legend{
  position:fixed;top:70px;left:0;right:0;z-index:190;
  background:rgba(13,26,13,.92);border-bottom:1px solid var(--green-m);
  display:flex;gap:24px;justify-content:center;align-items:center;
  padding:8px 20px;flex-wrap:wrap;backdrop-filter:blur(6px);
}
.leg{display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--text-dim)}
.leg-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);flex-shrink:0}
.leg-line{width:28px;height:2px;background:var(--accent);border-radius:1px}

/* ─── TREE AREA ─── */
#tree-view{
  margin-top:106px;overflow:auto;padding:30px 20px 60px;
  min-height:calc(100vh - 106px);
}
#tree-canvas{position:relative;margin:0 auto}
#tree-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}

/* ─── MEMBER CARD ─── */
.mcard{
  position:absolute;width:122px;
  border-radius:10px;padding:14px 10px 12px;cursor:pointer;text-align:center;
  transition:transform .25s,box-shadow .25s,border-color .25s;
  box-shadow:0 4px 18px rgba(0,0,0,.55);border:2px solid rgba(201,168,76,.15);
  color:#fff;
}
.mcard:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(201,168,76,.35);border-color:var(--accent)}
.mcard.male{background:var(--card-m)}
.mcard.female{background:var(--card-f)}
.mcard.deceased{opacity:.7;filter:saturate(.5)}
.mcard.deceased .mavatar{background:var(--card-dec)!important}
.mavatar{
  width:52px;height:52px;border-radius:50%;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;
  border:3px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.15);
}
.mname{font-family:'Playfair Display',serif;font-size:.72rem;font-weight:700;line-height:1.3;margin-bottom:3px;color:#fff}
.mrole{font-size:.63rem;color:rgba(255,255,255,.7);font-style:italic}
.mdob{font-size:.58rem;color:rgba(255,255,255,.55);margin-top:3px}
.dec-badge{
  position:absolute;top:5px;right:5px;font-size:.52rem;
  background:rgba(0,0,0,.5);color:#ccc;padding:1px 4px;border-radius:3px;
}
.gen-badge{
  position:absolute;top:5px;left:5px;font-size:.52rem;
  background:rgba(201,168,76,.3);color:var(--accent);padding:1px 4px;border-radius:3px;
}

/* ─── MODALS ─── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.on{opacity:1;pointer-events:all}
.modal{
  background:linear-gradient(135deg,var(--surface),var(--bg));
  border:2px solid var(--accent);border-radius:14px;
  padding:36px;max-width:520px;width:92%;
  max-height:90vh;overflow-y:auto;
  transform:scale(.92) translateY(20px);transition:transform .3s;position:relative;
}
.overlay.on .modal{transform:scale(1) translateY(0)}
.mclose{
  position:absolute;top:14px;right:18px;background:none;border:none;
  color:var(--accent);font-size:1.6rem;cursor:pointer;line-height:1;opacity:.7;
}
.mclose:hover{opacity:1}

/* member detail modal */
.det-avatar{
  width:86px;height:86px;border-radius:50%;margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;
  border:4px solid var(--accent);color:#fff;
}
.det-name{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--accent);text-align:center;margin-bottom:4px}
.det-role{text-align:center;color:var(--text-dim);font-style:italic;margin-bottom:22px;font-size:1rem}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.det-item label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:3px}
.det-item span{font-size:.98rem;color:var(--cream)}
.det-link{cursor:pointer;color:var(--accent2)!important;text-decoration:underline dotted}
.det-bio{border-top:1px solid var(--green-m);padding-top:18px}
.det-bio label{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:8px}
.det-bio p{color:#c5d5c5;line-height:1.75;font-size:.95rem}
.det-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.det-actions .btn{padding:8px 18px;font-size:.88rem}

/* login modal */
.login-box{max-width:380px}
.login-title{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--accent);text-align:center;margin-bottom:28px}
.login-hint{text-align:center;margin-top:14px;font-size:.78rem;color:var(--text-dim)}
.err{color:#e74c3c;font-size:.85rem;margin-top:8px;text-align:center;display:none}

/* ─── FORMS ─── */
.fg{margin-bottom:16px}
.fg label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:1.1px;color:var(--accent);margin-bottom:6px}
.fg input,.fg select,.fg textarea{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid var(--green-m);border-radius:6px;
  padding:11px 14px;color:var(--cream);
  font-family:'Crimson Text',serif;font-size:.95rem;transition:border-color .25s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--accent)}
.fg textarea{resize:vertical;min-height:75px}
.fg select option{background:var(--surface)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ─── ADMIN PANEL ─── */
#adm{
  position:fixed;right:0;top:0;bottom:0;width:370px;
  background:linear-gradient(180deg,#0a140a,var(--surface));
  border-left:2px solid var(--accent);padding:76px 22px 22px;
  overflow-y:auto;z-index:150;
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
}
#adm.open{transform:translateX(0)}
.adm-title{
  font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent);
  margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--green-m);
}
.adm-form{
  background:rgba(255,255,255,.04);border:1px solid var(--green-m);
  border-radius:10px;padding:18px;margin-bottom:18px;display:none;
}
.adm-form-title{font-family:'Playfair Display',serif;color:var(--accent);font-size:1rem;margin-bottom:14px}
.adm-form .fg{margin-bottom:12px}
.adm-form .fg label{font-size:.65rem}
.adm-form .fg input,.adm-form .fg select,.adm-form .fg textarea{padding:9px 12px;font-size:.88rem}
.adm-form .fg-row{gap:8px}

.mlist-item{
  display:flex;align-items:center;gap:10px;padding:11px;margin-bottom:7px;
  background:rgba(255,255,255,.04);border-radius:8px;border:1px solid transparent;
  transition:all .2s;
}
.mlist-item:hover{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.07)}
.mlist-av{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;font-weight:700;color:#fff;font-size:.9rem;flex-shrink:0;
}
.mlist-info{flex:1;min-width:0}
.mlist-name{font-size:.9rem;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mlist-role{font-size:.7rem;color:var(--text-dim)}
.mlist-btns{display:flex;gap:4px;flex-shrink:0}
.ibtn{
  background:none;border:1px solid transparent;color:var(--text-dim);
  cursor:pointer;padding:4px 7px;border-radius:4px;font-size:.85rem;transition:all .2s;
}
.ibtn:hover{border-color:var(--accent);color:var(--accent)}
.ibtn.del:hover{border-color:#c0392b;color:#c0392b}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--accent);color:var(--bg);padding:11px 26px;
  border-radius:6px;font-size:.95rem;z-index:9999;
  transition:transform .3s;pointer-events:none;white-space:nowrap;font-weight:600;
}
#toast.on{transform:translateX(-50%) translateY(0)}

/* ─── GEN LABELS ─── */
.gen-label{
  position:absolute;left:0;font-family:'Playfair Display',serif;
  font-size:.75rem;color:var(--accent);opacity:.6;letter-spacing:1px;
  writing-mode:horizontal-tb;white-space:nowrap;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--green-m);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

@media(max-width:600px){
  header{padding:12px 16px}.hdr-title{font-size:1.3rem}
  #adm{width:100vw}.modal{padding:24px}
}
</style>
</head>

<!-- ══ HEADER ══ -->
<header>
  <div class="hdr-brand">

    <button class="btn" id="btn-login" onclick="openLogin()">⚿ Admin Login</button>
    <button class="btn btn-fill" id="btn-adm" style="display:none" onclick="toggleAdm()">Manage ▸</button>
    <button class="btn btn-red btn-sm" id="btn-logout" style="display:none" onclick="doLogout()">Logout</button>
  </div>
</header>

<!-- ══ LEGEND ══ -->


<!-- ══ TREE ══ -->
<div id="tree-view">
  <div id="tree-canvas">
    <svg id="tree-svg"></svg>
    <div id="tree-nodes"></div>
  </div>
</div>

<!-- ══ MEMBER DETAIL MODAL ══ -->
<div class="overlay" id="ov-detail">
  <div class="modal" id="det-modal">
    <button class="mclose" onclick="closeOv('ov-detail')">×</button>
    <div id="det-body"></div>
  </div>
</div>

<!-- ══ LOGIN MODAL ══ -->
<div class="overlay" id="ov-login">
  <div class="modal login-box">
    <button class="mclose" onclick="closeOv('ov-login')">×</button>
    <div class="login-title">🔐 Admin Login</div>
    <div class="fg"><label>Username</label><input type="text" id="lu" placeholder="admin"/></div>
    <div class="fg"><label>Password</label><input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="lerr">Invalid credentials. Try again.</div>
    <button class="btn btn-fill" style="width:100%;margin-top:8px" onclick="doLogin()">Login</button>
    <p class="login-hint">Default credentials: <strong>admin</strong> / <strong>family123</strong></p>
  </div>
</div>

<!-- ══ ADMIN PANEL ══ -->
<div id="adm">
  <div class="adm-title">👨‍👩‍👧‍👦 Family Members</div>
  <button class="btn btn-fill" style="width:100%;margin-bottom:18px" onclick="showForm()">＋ Add New Member</button>

  <!-- FORM -->
  <div class="adm-form" id="adm-form">
    <div class="adm-form-title" id="form-title">Add Member</div>
    <input type="hidden" id="f-id"/>
    <div class="fg-row">
      <div class="fg"><label>First Name *</label><input type="text" id="f-fn"/></div>
      <div class="fg"><label>Last Name *</label><input type="text" id="f-ln"/></div>
    </div>
    <div class="fg"><label>Gender</label>
      <select id="f-gender"><option value="male">Male</option><option value="female">Female</option></select>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Born (year)</label><input type="text" id="f-dob" placeholder="1985"/></div>
      <div class="fg"><label>Died (year)</label><input type="text" id="f-dod" placeholder="if deceased"/></div>
    </div>
    <div class="fg"><label>Relation / Role</label><input type="text" id="f-role" placeholder="Son, Daughter-in-law…"/></div>
    <div class="fg"><label>Parent (family head)</label>
      <select id="f-parent"><option value="">— Root / No parent —</option></select>
    </div>
    <div class="fg"><label>Spouse</label>
      <select id="f-spouse"><option value="">— None —</option></select>
    </div>
    <div class="fg"><label>Location</label><input type="text" id="f-loc" placeholder="City, State"/></div>
    <div class="fg-row">
      <div class="fg"><label>Phone</label><input type="text" id="f-phone"/></div>
      <div class="fg"><label>Email</label><input type="text" id="f-email"/></div>
    </div>
    <div class="fg"><label>Bio / About</label><textarea id="f-bio" rows="3"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-fill" style="flex:1" onclick="saveMember()">✓ Save</button>
      <button class="btn" onclick="cancelForm()">Cancel</button>
    </div>
  </div>

  <!-- LIST -->
  <div id="adm-list"></div>
</div>

<!-- ══ TOAST ══ -->
<div id="toast"></div>

   parentId:9,spouseId:null,generation:3},

  {id:18,name:"Aanya Sharma",gender:"female",dob:"2013",dod:null,

   bio:"Aanya is a bright, imaginative child who loves painting, dancing, and making up stories. She is Aryan's little sister and the youngest child of Amit and Sanya. She has already won several school art competitions.",
   parentId:9,spouseId:null,generation:3},

   bio:"Dev is an endlessly curious and energetic boy who loves science experiments, robotics, and astronomy. He wants to be an astronaut and asks questions that stump every adult at the dinner table. He is Ravi and Kavita's son.",
   parentId:11,spouseId:null,generation:3}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let members = JSON.parse(JSON.stringify(DEFAULT));
let isAdmin = localStorage.getItem('ft_admin') === '1';
let editId = null;

const CARD_W = 122, CARD_H = 158;
const H_GAP = 48, V_GAP = 96;
const COUPLE_GAP = 18;
const CUW = CARD_W*2 + COUPLE_GAP; // couple unit width
const PAD = 40;

function save(){ localStorage.setItem('ft_members', JSON.stringify(members)); }

/* ═══════════════════════════════════════════
   TREE LAYOUT
═══════════════════════════════════════════ */
function buildTree(){
  const rendered = new Set();

  function node(m){
    if(rendered.has(m.id)) return null;
    rendered.add(m.id);
    const spouse = m.spouseId ? members.find(x=>x.id===m.spouseId) : null;
    if(spouse) rendered.add(spouse.id);

    const sids = spouse ? [m.id, spouse.id] : [m.id];
    const children = members
      .filter(c => sids.includes(c.parentId) && !rendered.has(c.id))
      .map(c => node(c))
      .filter(Boolean);

    return {m, spouse, children, x:0, y:0, w:0};
  }

  const root = members.find(m => !m.parentId && m.generation===0 && m.gender==='male')
             || members.find(m => !m.parentId && m.generation===0);
  return root ? node(root) : null;
}

function calcWidth(n){
  const self = n.spouse ? CUW : CARD_W;
  if(!n.children.length){ n.w = self; return; }
  n.children.forEach(calcWidth);
  const cw = n.children.reduce((s,c)=>s+c.w,0) + H_GAP*(n.children.length-1);
  n.w = Math.max(self, cw);
}

function position(n, cx, y){
  n.x = cx; n.y = y;
  if(!n.children.length) return;
  const total = n.children.reduce((s,c)=>s+c.w,0) + H_GAP*(n.children.length-1);
  let lx = cx - total/2;
  n.children.forEach(c=>{ position(c, lx + c.w/2, y + CARD_H + V_GAP); lx += c.w + H_GAP; });
}

function flatten(n, nodes=[], edges=[]){
  nodes.push(n);
  n.children.forEach(c=>{ edges.push({p:n,c}); flatten(c,nodes,edges); });
  return {nodes,edges};
}

/* ═══════════════════════════════════════════
   RENDER TREE
═══════════════════════════════════════════ */
function renderTree(){
  const root = buildTree();
  const wrap = document.getElementById('tree-nodes');
  const svg  = document.getElementById('tree-svg');
  wrap.innerHTML = ''; svg.innerHTML = '';

  document.getElementById('lbl-count').textContent = members.length + ' members';

  if(!root){
    wrap.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-dim);font-style:italic">No family data. Add members via Admin panel.</div>';
    return;
  }

  calcWidth(root);
  position(root, root.w/2 + PAD, PAD);

  const {nodes, edges} = flatten(root);

  // canvas size
  let maxX = 0, maxY = 0;
  nodes.forEach(n=>{
    const hw = (n.spouse ? CUW : CARD_W);
    maxX = Math.max(maxX, n.x + hw/2 + PAD);
    maxY = Math.max(maxY, n.y + CARD_H + PAD);
  });

  const cvs = document.getElementById('tree-canvas');
  const W = Math.max(maxX, window.innerWidth - 40);
  cvs.style.width  = W + 'px';
  cvs.style.height = maxY + 'px';
  svg.setAttribute('width', W);
  svg.setAttribute('height', maxY);

  // draw edges
  edges.forEach(({p,c})=>{
    const px = p.x, py = p.y + CARD_H;
    const cx = c.x, cy = c.y;
    const mid = py + (cy - py) * .5;
    const path = mkSvg('path');
    path.setAttribute('d',`M${px},${py} C${px},${mid} ${cx},${mid} ${cx},${cy}`);
    path.setAttribute('stroke','#c9a84c');
    path.setAttribute('stroke-width','1.8');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-opacity','0.7');
    svg.appendChild(path);
    // small arrow tip
    const tip = mkSvg('circle');
    tip.setAttribute('cx',cx); tip.setAttribute('cy',cy);
    tip.setAttribute('r','3'); tip.setAttribute('fill','#c9a84c');
    tip.setAttribute('opacity','0.6');
    svg.appendChild(tip);
  });

  // draw couple lines + hearts
  nodes.forEach(n=>{
    if(!n.spouse) return;
    const mx = n.x, my = n.y + CARD_H/2;
    // dashes
    const line = mkSvg('line');
    line.setAttribute('x1', mx - COUPLE_GAP/2);
    line.setAttribute('y1', my);
    line.setAttribute('x2', mx + COUPLE_GAP/2);
    line.setAttribute('y2', my);
    line.setAttribute('stroke','#c9a84c');
    line.setAttribute('stroke-width','2.5');
    svg.appendChild(line);
    // heart
    const ht = mkSvg('text');
    ht.setAttribute('x', mx); ht.setAttribute('y', my + 5);
    ht.setAttribute('text-anchor','middle');
    ht.setAttribute('font-size','13');
    ht.setAttribute('fill','#e8a0b0');
    ht.textContent = '♥';
    svg.appendChild(ht);
  });

  // render cards
  nodes.forEach(n=>{
    const leftX = n.x - (n.spouse ? CUW : CARD_W) / 2;
    renderCard(wrap, n.m, leftX, n.y);
    if(n.spouse) renderCard(wrap, n.spouse, leftX + CARD_W + COUPLE_GAP, n.y);
  });

  // generation labels
  const genMap = {};
  nodes.forEach(n=>{ genMap[n.m.generation] = Math.min(genMap[n.m.generation]??999, n.y); });
  const genNames = ['1st Generation','2nd Generation','3rd Generation','4th Generation','5th Generation'];
  Object.entries(genMap).forEach(([g,y])=>{
    const lbl = document.createElement('div');
    lbl.className = 'gen-label';
    lbl.style.top = (y + CARD_H/2 - 8) + 'px';
    lbl.textContent = genNames[g] || `Gen ${+g+1}`;
    wrap.appendChild(lbl);
  });
}

function mkSvg(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }

function getInitials(name){
  return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

function renderCard(wrap, m, x, y){
  const d = document.createElement('div');
  d.className = `mcard ${m.gender}${m.dod?' deceased':''}`;
  d.style.left = x + 'px';
  d.style.top  = y + 'px';
  d.style.width = CARD_W + 'px';
  d.style.height = CARD_H + 'px';
  d.onclick = ()=> showDetail(m.id);
  d.innerHTML = `
    ${m.dod ? `<span class="dec-badge">✝ ${m.dod}</span>` : ''}
    <span class="gen-badge">G${m.generation+1}</span>
    <div class="mavatar">${getInitials(m.name)}</div>
    <div class="mname">${m.name}</div>
    <div class="mrole">${m.relation}</div>
    <div class="mdob">b.${m.dob}${m.dod?' – ✝'+m.dod:''}</div>
  `;
  wrap.appendChild(d);
}

/* ═══════════════════════════════════════════
   MEMBER DETAIL MODAL
═══════════════════════════════════════════ */
function showDetail(id){
  const m = members.find(x=>x.id===id);
  if(!m) return;
  const spouse   = m.spouseId  ? members.find(x=>x.id===m.spouseId)  : null;
  const parent   = m.parentId  ? members.find(x=>x.id===m.parentId)  : null;
  const children = members.filter(x=> x.parentId===id || (spouse && x.parentId===spouse.id));
  const uniq     = [...new Map(children.map(x=>[x.id,x])).values()];

  const bg = m.dod ? 'linear-gradient(135deg,#3a3a3a,#555)'
           : m.gender==='male' ? 'linear-gradient(135deg,#1e3f6e,#2a5898)'
           : 'linear-gradient(135deg,#6e1e45,#982a62)';

  const row=(label,val,extra='')=> val
    ? `<div class="det-item"><label>${label}</label><span ${extra}>${val}</span></div>` : '';

  document.getElementById('det-body').innerHTML = `
    <div style="text-align:center;margin-bottom:22px">
      <div class="det-avatar" style="background:${bg}">${getInitials(m.name)}</div>
      <div class="det-name">${m.name}</div>
      <div class="det-role">${m.relation}${m.dod?' · ✝ Deceased':''}</div>
    </div>
    <div class="det-grid">
      ${row('Date of Birth', m.dob ? `${m.dob}` : null)}
      ${m.dod ? row('Date of Passing', m.dod) : '<div></div>'}
      ${spouse ? `<div class="det-item"><label>Spouse</label><span class="det-link" onclick="showDetail(${spouse.id})">${spouse.name}</span></div>` : '<div></div>'}
      ${parent ? `<div class="det-item"><label>Parent</label><span class="det-link" onclick="showDetail(${parent.id})">${parent.name}</span></div>` : '<div></div>'}
      ${row('Location', m.location)}
      ${row('Phone', m.phone)}
      ${row('Email', m.email)}
      ${uniq.length ? `<div class="det-item" style="grid-column:1/-1"><label>Children (${uniq.length})</label><span>${uniq.map(c=>`<span class="det-link" onclick="showDetail(${c.id})">${c.name}</span>`).join(', ')}</span></div>` : ''}
      <div class="det-item"><label>Generation</label><span>Generation ${m.generation+1}</span></div>
    </div>
    ${m.bio ? `<div class="det-bio"><label>About</label><p>${m.bio}</p></div>` : ''}
    ${isAdmin ? `<div class="det-actions">
      <button class="btn btn-sm" onclick="editMember(${m.id})">✏ Edit</button>
      <button class="btn btn-red btn-sm" onclick="confirmDel(${m.id})">🗑 Delete</button>
    </div>` : ''}
  `;
  openOv('ov-detail');
}

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
function openLogin(){ document.getElementById('lerr').style.display='none'; openOv('ov-login'); }

function doLogin(){
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value;
  if(u==='admin' && p==='family123'){
    isAdmin=true; localStorage.setItem('ft_admin','1');
    closeOv('ov-login'); updateAdminUI(); renderTree();
    toast('Welcome, Admin! 👑');
  } else {
    document.getElementById('lerr').style.display='block';
  }
}

function doLogout(){
  isAdmin=false; localStorage.removeItem('ft_admin');
  document.getElementById('adm').classList.remove('open');
  updateAdminUI(); renderTree();
  toast('Logged out successfully.');
}

function updateAdminUI(){
  document.getElementById('btn-login').style.display  = isAdmin ? 'none' : '';
  document.getElementById('btn-adm').style.display    = isAdmin ? '' : 'none';
  document.getElementById('btn-logout').style.display = isAdmin ? '' : 'none';
}

/* ═══════════════════════════════════════════
   ADMIN PANEL
═══════════════════════════════════════════ */
function toggleAdm(){
  const p = document.getElementById('adm');
  p.classList.toggle('open');
  if(p.classList.contains('open')) renderAdmList();
}

function renderAdmList(){
  const sorted = [...members].sort((a,b)=> a.generation - b.generation || a.name.localeCompare(b.name));
  document.getElementById('adm-list').innerHTML = sorted.map(m=>`
    <div class="mlist-item">
      <div class="mlist-av" style="background:${m.gender==='male'
        ?'linear-gradient(135deg,#1e3f6e,#2a5898)'
        :'linear-gradient(135deg,#6e1e45,#982a62)'}">
        ${getInitials(m.name)}
      </div>
      <div class="mlist-info">
        <div class="mlist-name">${m.name}</div>
        <div class="mlist-role">${m.relation} · Gen ${m.generation+1}</div>
      </div>
      <div class="mlist-btns">
        <button class="ibtn" onclick="editMember(${m.id})" title="Edit">✏️</button>
        <button class="ibtn del" onclick="confirmDel(${m.id})" title="Delete">🗑️</button>
      </div>
    </div>
  `).join('');
}

function fillSelects(excludeId=null, selParent=null, selSpouse=null){
  const opts = members.filter(m=>m.id!==excludeId);
  document.getElementById('f-parent').innerHTML =
    '<option value="">— Root / No parent —</option>' +
    opts.map(m=>`<option value="${m.id}" ${m.id===selParent?'selected':''}>${m.name} (G${m.generation+1})</option>`).join('');
  document.getElementById('f-spouse').innerHTML =
    '<option value="">— None —</option>' +
    opts.map(m=>`<option value="${m.id}" ${m.id===selSpouse?'selected':''}>${m.name}</option>`).join('');
}

function showForm(){
  editId=null;
  document.getElementById('form-title').textContent='Add New Member';
  ['f-id','f-fn','f-ln','f-dob','f-dod','f-role','f-loc','f-phone','f-email','f-bio'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-gender').value='male';
  fillSelects();
  document.getElementById('adm-form').style.display='block';
  document.getElementById('adm-form').scrollIntoView({behavior:'smooth'});
}

function editMember(id){
  const m = members.find(x=>x.id===id); if(!m) return;
  editId = id;
  const parts = m.name.split(' ');
  const ln = parts.pop(); const fn = parts.join(' ');
  document.getElementById('form-title').textContent='Edit Member';
  document.getElementById('f-id').value     = m.id;
  document.getElementById('f-fn').value     = fn;
  document.getElementById('f-ln').value     = ln;
  document.getElementById('f-gender').value = m.gender;
  document.getElementById('f-dob').value    = m.dob||'';
  document.getElementById('f-dod').value    = m.dod||'';
  document.getElementById('f-role').value   = m.relation||'';
  document.getElementById('f-loc').value    = m.location||'';
  document.getElementById('f-phone').value  = m.phone||'';
  document.getElementById('f-email').value  = m.email||'';
  document.getElementById('f-bio').value    = m.bio||'';
  fillSelects(id, m.parentId, m.spouseId);
  closeOv('ov-detail');
  document.getElementById('adm').classList.add('open');
  document.getElementById('adm-form').style.display='block';
  document.getElementById('adm-form').scrollIntoView({behavior:'smooth'});
}

function cancelForm(){
  document.getElementById('adm-form').style.display='none';
  editId=null;
}

function saveMember(){
  const fn = document.getElementById('f-fn').value.trim();
  const ln = document.getElementById('f-ln').value.trim();
  if(!fn||!ln){ toast('Please enter first and last name.'); return; }

  const parentId = parseInt(document.getElementById('f-parent').value)||null;
  const spouseId = parseInt(document.getElementById('f-spouse').value)||null;
  const parent   = parentId ? members.find(m=>m.id===parentId) : null;
  const gen      = parent ? parent.generation+1 : 0;

  const data = {
    name: `${fn} ${ln}`,
    gender: document.getElementById('f-gender').value,
    dob: document.getElementById('f-dob').value.trim()||null,
    dod: document.getElementById('f-dod').value.trim()||null,
    relation: document.getElementById('f-role').value.trim(),
    location: document.getElementById('f-loc').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    email: document.getElementById('f-email').value.trim(),
    bio: document.getElementById('f-bio').value.trim(),
    parentId, spouseId, generation: gen
  };

  if(editId){
    const i = members.findIndex(m=>m.id===editId);
    members[i] = {...members[i], ...data};
    // update old spouse
    members.forEach(m=>{ if(m.spouseId===editId && m.id!==spouseId) m.spouseId=null; });
    if(spouseId){ const si=members.findIndex(m=>m.id===spouseId); if(si>-1) members[si].spouseId=editId; }
    toast('Member updated ✓');
  } else {
    const newId = Math.max(0,...members.map(m=>m.id))+1;
    members.push({id:newId,...data});
    if(spouseId){ const si=members.findIndex(m=>m.id===spouseId); if(si>-1) members[si].spouseId=newId; }
    toast('Member added ✓');
  }

  save(); cancelForm(); renderTree(); renderAdmList();
}

function confirmDel(id){
  const m = members.find(x=>x.id===id);
  if(!m) return;
  if(confirm(`Delete "${m.name}"?\n\nThis will also unlink their spouse and parent connections. This cannot be undone.`)){
    members.forEach(x=>{ if(x.spouseId===id) x.spouseId=null; if(x.parentId===id) x.parentId=null; });
    members = members.filter(x=>x.id!==id);
    save(); closeOv('ov-detail'); renderTree(); renderAdmList();
    toast(`"${m.name}" removed.`);
  }
}

/* ═══════════════════════════════════════════
   MODAL HELPERS
═══════════════════════════════════════════ */
function openOv(id){ document.getElementById(id).classList.add('on'); }
function closeOv(id){ document.getElementById(id).classList.remove('on'); }

document.querySelectorAll('.overlay').forEach(ov=>{
  ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('on'); });
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') document.querySelectorAll('.overlay.on').forEach(o=>o.classList.remove('on'));
});

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let _tt;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('on'), 3200);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', ()=>{
  updateAdminUI();
  renderTree();
});
window.addEventListener('resize', ()=> renderTree());
</script>
